<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffd6ec" />
    <title>樱花魔法命运牌</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          radial-gradient(circle at 72% 8%, rgba(255, 255, 255, 0.92), transparent 26%),
          radial-gradient(circle at 18% 18%, rgba(255, 184, 220, 0.78), transparent 34%),
          linear-gradient(135deg, #ffd2ec 0%, #f7c3e8 42%, #b589d3 100%);
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #7a376d;
        font-family:
          Inter,
          "PingFang SC",
          "Microsoft YaHei",
          system-ui,
          sans-serif;
      }

      .boot-shell__card {
        width: min(360px, calc(100vw - 48px));
        padding: 28px 24px;
        border: 1px solid rgba(255, 236, 190, 0.72);
        border-radius: 22px;
        text-align: center;
        background: rgba(255, 255, 255, 0.32);
        box-shadow: 0 22px 70px rgba(169, 82, 142, 0.2);
        backdrop-filter: blur(16px);
      }

      .boot-shell__sigil {
        width: 46px;
        height: 46px;
        margin: 0 auto 14px;
        border-radius: 50%;
        border: 1px solid rgba(198, 143, 72, 0.42);
        background:
          radial-gradient(circle, rgba(255, 245, 186, 0.95) 0 14%, transparent 15%),
          conic-gradient(from 45deg, rgba(255, 255, 255, 0), rgba(255, 220, 139, 0.74), rgba(255, 255, 255, 0));
        animation: bootSpin 1.6s linear infinite;
      }

      .boot-shell__title {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .boot-shell__text {
        margin: 0;
        font-size: 14px;
        color: rgba(93, 42, 85, 0.72);
      }

      @keyframes bootSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-shell__card">
          <div class="boot-shell__sigil"></div>
          <p class="boot-shell__title">樱花魔法命运牌</p>
          <p class="boot-shell__text">星光牌阵正在展开...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
